<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web - ShopTLU</title>
</head>
<body>

    <header>
        <h1>Welcome to ShopTLU</h1>
        <nav>
            <a href="home.html">Trang chủ</a>
            <a href="products.html">Sản phẩm</a>
        </nav>
    </header>
    
    <main>
        <section>
            <h3>Sản phẩm hot</h3>
            <figure>
                <img src="iphone.jpg" alt="Điện thoại iPhone 16 Pro" width="300">
                <figcaption>iPhone 16 Pro - Đỉnh cao công nghệ</figcaption>
            </figure>
            <p>Giá: <b>25.990.000đ</b></p>
        </section>
        
        <section>
            <h3>Thông tin sản phẩm</h3>
            <table border="1" style="border-collapse: collapse; width: 50%;">
                <thead>
                    <tr style="background-color: #eee;">
                        <th>Tên sản phẩm</th>
                        <th>Giá niêm yết</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>iPhone 16 Pro</td>
                        <td>25.990.000đ</td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan="2">Cập nhật mới nhất: 2026</td>
                    </tr>
                </tfoot>
            </table>
        </section>
    </main>
    
    <aside>
        <h4>Thông tin bên lề</h4>
        <p>Sidebar content ở đây.</p>
    </aside>
    
    <footer>
        <p>&copy; Copyright 2026 - ShopTLU</p>
    </footer>

</body>
</html>
